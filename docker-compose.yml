version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: apex-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Node.js Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Use the service name 'db' in the connection string
      - DATABASE_URL=postgres://postgres:postgres@db:5432/apex_db
      - PORT=5000
      - NODE_ENV=production
      # IMPORTANT: Additional env vars (Razorpay/Appwrite) should be provided 
      # via a .env file or by adding them here manually.
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
